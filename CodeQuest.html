<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CodeQuest: De Cero a POO</title>

    <!-- Dependencias externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/material-ocean.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/clike/clike.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Estilos propios -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="text-slate-200">

    <header class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-4 shrink-0 shadow-xl" style="padding-top: env(safe-area-inset-top)">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center font-black text-white shadow-lg">CQ</div>
            <select id="lang-select" class="bg-slate-800 border-none text-[10px] font-bold text-slate-100 outline-none rounded-lg px-2 py-1">
                <option value="python">PYTHON</option>
                <option value="cpp">C++</option>
            </select>
        </div>
        <div class="text-right">
            <div id="progreso-badge" class="text-[10px] text-indigo-400 font-bold tracking-widest">ETAPA 1/30</div>
            <div id="type-label" class="text-[8px] uppercase font-black text-slate-500">Iniciando</div>
        </div>
    </header>

    <main id="main-content" class="flex-1 overflow-hidden relative"></main>

    <nav id="bottom-nav" class="h-16 bg-slate-900 border-t border-slate-800 flex items-stretch shrink-0" style="padding-bottom: env(safe-area-inset-bottom)">
        <button id="tab-docs" class="flex-1 flex flex-col items-center justify-center gap-1 tab-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/>
            </svg>
            <span class="text-[9px] font-bold uppercase tracking-widest">Misión</span>
        </button>
        <button id="tab-editor" class="flex-1 flex flex-col items-center justify-center gap-1 tab-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
            </svg>
            <span class="text-[9px] font-bold uppercase tracking-widest">Editor</span>
        </button>
        <button id="tab-console" class="flex-1 flex flex-col items-center justify-center gap-1 tab-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2"/><path d="M7 8l3 3-3 3"/><path d="M12 14h4"/>
            </svg>
            <span class="text-[9px] font-bold uppercase tracking-widest">Consola</span>
        </button>
    </nav>

    <div id="modal" class="hidden fixed inset-0 z-[100] bg-slate-950/90 flex items-center justify-center p-8 backdrop-blur-sm">
        <div class="bg-slate-900 border border-indigo-500/30 p-8 rounded-3xl w-full max-w-xs text-center shadow-2xl">
            <div class="text-5xl mb-4">🚀</div>
            <h3 class="text-xl font-bold text-white mb-2 tracking-tighter">¡LOGRADO!</h3>
            <p class="text-slate-400 text-xs mb-6">Tu código ha pasado la prueba.</p>
            <button id="btn-next" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl tracking-widest text-[10px]">CONTINUAR</button>
        </div>
    </div>

    <script src="levels.js"></script>
    <script src="interpreter.js"></script>
    <script src="app.js"></script>
</body>
</html>
